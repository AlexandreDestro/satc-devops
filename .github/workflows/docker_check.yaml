name: Nocta CI

on:
  push:
    branches: [ main ]

jobs:
  docker-check:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: alexandredestro/satc-devops
      IMAGE_TAG: 0.0.1

    steps:
    # ✅ חובה: checkout the repo
    - name: Checkout repository
      uses: actions/checkout@v4

    # ✅ Docker login
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # ✅ Build image
    - name: Build Docker image
      run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

    # ✅ (Optional but recommended) Push image
    - name: Push Docker image
      run: docker push $IMAGE_NAME:$IMAGE_TAG

    # ✅ SonarCloud analysis
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      with:
        args: >
          -Dsonar.projectKey=alexandredestro_satc-devops
          -Dsonar.organization=alexandredestro
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.sources=.
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # ✅ Trivy scan (LOCAL image — no mismatch now)
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'image'
        image-ref: '${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}'
        format: json
        output: trivy-results.json
        severity: MEDIUM,HIGH,CRITICAL

    # ✅ Upload results
    - name: Upload Trivy results as artifact
      uses: actions/upload-artifact@v4
      with:
        name: trivy-results
        path: trivy-results.json

    # ✅ Analyze Trivy results
    - name: Analyze Trivy results
      run: |
        if [ -f trivy-results.json ]; then
          VULN_COUNT=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity == "MEDIUM")] | length' trivy-results.json)
          echo "Quantidade de vulnerabilidades médias: $VULN_COUNT"

          if [ "$VULN_COUNT" -gt 2 ]; then
            echo "Pipeline bloqueada: mais de 2 vulnerabilidades médias encontradas."
            exit 1
          fi
        else
          echo "Arquivo de resultados do Trivy não encontrado."
          exit 1
        fi

    # ✅ SonarCloud API check (fixed project key)
    - name: Fail if too many Sonar vulnerabilities
      run: |
        COUNT=$(curl -s -u "${SONAR_TOKEN}:" \
          "https://sonarcloud.io/api/issues/search?componentKeys=alexandredestro_satc-devops&types=VULNERABILITY&severities=MAJOR&resolved=false&ps=1" \
          | jq '.total')

        echo "Quantidade de vulnerabilidades médias: $COUNT"

        if [ "$COUNT" -gt 2 ]; then
          echo "Pipeline bloqueada: mais de 2 vulnerabilidades médias encontradas."
          exit 1
        fi
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}